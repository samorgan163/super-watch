version: "3.9"

services:

  backend:
    build: ./backend
    container_name: superwatch_backend
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: superwatch_frontend
    env_file:
      - ./frontend/.env.production
    ports:
      - "80:80"
    depends_on:
      - backend